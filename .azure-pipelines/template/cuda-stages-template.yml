parameters:
  - name: matrix
    type: object
    default: {}
  - name: POOL_NAME
    type: string
    default: "RunPod-GPU-Pool"
  - name: AGENT_NAME
    type: string
    default: "runpod-agent-$(Build.BuildId)"

stages:
  - ${{ each pair in parameters.matrix }}:
    - stage: Start_Pod_${{ pair.key }}
      displayName: "Start Pod ${{ pair.value.PART }}"
      dependsOn: []
      jobs:
        - job: Start_Pod_Job
          displayName: "Launch Pod & Run CUDA Tests"
          timeoutInMinutes: 60
          pool:
            vmImage: "ubuntu-latest"
          steps:
            - checkout: self

            - task: UsePythonVersion@0
              inputs:
                versionSpec: "3.13"
              displayName: "Use Python 3.13"

            - task: Bash@3
              displayName: "Install dependencies"
              inputs:
                targetType: "inline"
                script: |
                  pip install requests

            - task: Bash@3
              displayName: "Create RunPod Instance"
              name: create_runpod
              inputs:
                targetType: "inline"
                script: |
                  export PYTHONUNBUFFERED=1
                  cd ${BUILD_SOURCESDIRECTORY}
                  python .azure-pipelines/scripts/cuda_unit_test/runpod_manager.py \
                    --action create \
                    --api_key $(RUNPOD_API_KEY) \
                    --name "ci-$(Build.BuildId)-${{ pair.value.PART }}" \
                    --container_disk_size "200" \
                    --env AZP_URL=$(System.CollectionUri) AZP_TOKEN=$(AZP_DEVOPS_PAT) AZP_POOL=$(POOL_NAME) AZP_AGENT_NAME=$(AGENT_NAME)-${{ pair.value.PART }}

            - task: Bash@3
              displayName: "Wait for Pod to be Online"
              name: wait_for_pod
              inputs:
                targetType: "inline"
                script: |
                  cd ${BUILD_SOURCESDIRECTORY}
                  export PYTHONUNBUFFERED=1
                  python .azure-pipelines/scripts/cuda_unit_test/runpod_manager.py \
                    --action wait \
                    --api_key $(RUNPOD_API_KEY) \
                    --name "ci-$(Build.BuildId)-${{ pair.value.PART }}"

            - task: Bash@3
              displayName: "Wait for Agent to be Online"
              name: wait_for_agent
              inputs:
                targetType: "inline"
                script: |
                  cd ${BUILD_SOURCESDIRECTORY}
                  export PYTHONUNBUFFERED=1
                  python .azure-pipelines/scripts/cuda_unit_test/azure_agent.py \
                    --action wait \
                    --url "$(System.CollectionUri)" \
                    --pat "$(AZP_DEVOPS_PAT)" \
                    --pool "$(POOL_NAME)" \
                    --agent "$(AGENT_NAME)-${{ pair.value.PART }}"

    - stage: GPU_Test_${{ pair.key }}
      displayName: "GPU Test ${{ pair.value.PART }}"
      dependsOn: Start_Pod_${{ pair.key }}
      jobs:
        - job: GpuTests
          timeoutInMinutes: 60
          pool:
            name: "$(POOL_NAME)"
            demands: Agent.Name -equals $(AGENT_NAME)-${{ pair.value.PART }}
          steps:
            - checkout: self
              clean: true
              displayName: "Checkout Repo"
            - script: |
                nvidia-smi
                uv pip install -U "huggingface_hub[cli]"
                hf auth login --token "$(HF_TOKEN)"
                bash .azure-pipelines/scripts/cuda_unit_test/run_cuda_ut.sh \
                  --test_case=all \
                  --test_part=${{ pair.value.PART }}
              displayName: "Run GPU Tests"

    - stage: Cleanup_Verification_${{ pair.key }}
      displayName: "Verify Pod Cleanup ${{ pair.value.PART }}"
      dependsOn:
        - Start_Pod_${{ pair.key }}
        - GPU_Test_${{ pair.key }}
      condition: always()
      jobs:
        - job: Verify_Cleanup
          pool:
            vmImage: "ubuntu-latest"
          steps:
            - checkout: self

            - task: UsePythonVersion@0
              inputs:
                versionSpec: "3.13"
              displayName: "Use Python 3.13"

            - task: Bash@3
              displayName: "Install dependencies"
              condition: always()
              inputs:
                targetType: "inline"
                script: |
                  pip install requests

            - task: Bash@3
              displayName: "Terminate RunPod Instance"
              condition: always()
              inputs:
                targetType: "inline"
                script: |
                  echo "Terminating Pod: ci-$(Build.BuildId)-${{ pair.value.PART }}"
                  export PYTHONUNBUFFERED=1
                  python .azure-pipelines/scripts/cuda_unit_test/runpod_manager.py \
                    --action terminate \
                    --api_key $(RUNPOD_API_KEY) \
                    --name "ci-$(Build.BuildId)-${{ pair.value.PART }}"

            - task: Bash@3
              displayName: "Deregister Agent from Pool"
              condition: always()
              inputs:
                targetType: "inline"
                script: |
                  cd ${BUILD_SOURCESDIRECTORY}
                  export PYTHONUNBUFFERED=1
                  python .azure-pipelines/scripts/cuda_unit_test/azure_agent.py \
                    --action deregister \
                    --url "$(System.CollectionUri)" \
                    --pat "$(AZP_DEVOPS_PAT)" \
                    --pool "$(POOL_NAME)" \
                    --agent "$(AGENT_NAME)-${{ pair.value.PART }}"
