trigger: none

variables:
  - name: POOL_NAME
    value: "RunPod-GPU-Pool"
  - name: AGENT_NAME
    value: "runpod-agent-$(Build.BuildId)"

stages:
  - stage: Start_Pod
    displayName: "GPU Tests on RunPod"
    jobs:
      - job: Start_Pod_Job
        displayName: "Launch Pod & Run CUDA Tests"
        timeoutInMinutes: 60
        pool:
          vmImage: "ubuntu-latest"

        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
            displayName: "Use Python 3.13"

          - task: Bash@3
            displayName: "Install dependencies"
            inputs:
              targetType: "inline"
              script: |
                pip install requests

          - task: Bash@3
            displayName: "Create RunPod Instance"
            name: create_runpod
            inputs:
              targetType: "inline"
              script: |
                export PYTHONUNBUFFERED=1
                cd ${BUILD_SOURCESDIRECTORY}
                python .azure-pipelines/scripts/cuda_unit_test/runpod_manager.py \
                  --action create \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "ci-$(Build.BuildId)" \
                  --container_disk_size "1000" \
                  --env AZP_URL=$(System.CollectionUri) AZP_TOKEN=$(AZP_DEVOPS_PAT) AZP_POOL=$(POOL_NAME) AZP_AGENT_NAME=$(AGENT_NAME)

          - task: Bash@3
            displayName: "Wait for Pod to be Online"
            name: wait_for_pod
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/cuda_unit_test/runpod_manager.py \
                  --action wait \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "ci-$(Build.BuildId)"

          - task: Bash@3
            displayName: "Wait for Agent to be Online"
            name: wait_for_agent
            inputs:
              targetType: "inline"
              script: |
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/cuda_unit_test/azure_agent.py \
                  --action wait \
                  --url "$(System.CollectionUri)" \
                  --pat "$(AZP_DEVOPS_PAT)" \
                  --pool "$(POOL_NAME)" \
                  --agent "$(AGENT_NAME)"

  - stage: GPU_Test
    dependsOn: Start_Pod
    jobs:
      - job: GpuTests
        timeoutInMinutes: 240
        pool:
          name: "$(POOL_NAME)"
          demands: Agent.Name -equals runpod-agent-$(Build.BuildId)
        steps:
          - checkout: self
            clean: true
            displayName: "Checkout out Repo"
          - script: |
              nvidia-smi
              bash .azure-pipelines/scripts/cuda_unit_test/run_cuda_ut.sh --test_case=all
            displayName: "Run GPU Tests"

  - stage: Cleanup_Verification
    displayName: "Verify Pod Cleanup"
    dependsOn:
      - Start_Pod
      - GPU_Test
    condition: always()
    jobs:
      - job: Verify_Cleanup
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.13"
            displayName: "Use Python 3.13"

          - task: Bash@3
            displayName: "Install dependencies"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                pip install requests

          - task: Bash@3
            displayName: "Terminate RunPod Instance"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                echo "Terminating Pod: ci-$(Build.BuildId)"
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/cuda_unit_test/runpod_manager.py \
                  --action terminate \
                  --api_key $(RUNPOD_API_KEY) \
                  --name "ci-$(Build.BuildId)"

          - task: Bash@3
            displayName: "Deregister Agent from Pool"
            condition: always()
            inputs:
              targetType: "inline"
              script: |
                pip install requests
                cd ${BUILD_SOURCESDIRECTORY}
                export PYTHONUNBUFFERED=1
                python .azure-pipelines/scripts/cuda_unit_test/azure_agent.py \
                  --action deregister \
                  --url "$(System.CollectionUri)" \
                  --pat "$(AZP_DEVOPS_PAT)" \
                  --pool "$(POOL_NAME)" \
                  --agent "$(AGENT_NAME)"
