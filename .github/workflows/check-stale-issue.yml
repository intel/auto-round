name: Close stale issue and pr

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          start-date: '2024-01-01T00:00:00Z'
          operations-per-run: 500

          days-before-issue-stale: 90
          days-before-issue-close: 30
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had any activity within 90 days. It will be automatically closed if no
            further activity occurs within 30 days. Leave a comment if
            you feel this issue should remain open. Thank you!
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            Please feel free to reopen if it is still relevant. Thank you!
          
          days-before-pr-stale: 90
          days-before-pr-close: 30
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not
            had any activity within 90 days. It will be automatically closed if no
            further activity occurs within 30 days. Leave a comment if
            you feel this pull request should remain open. Thank you!
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Please feel free to reopen if it is still relevant. Thank you!

          
